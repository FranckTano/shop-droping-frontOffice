<section id="collections" class="bg-white px-4 py-12">
  <div class="mx-auto max-w-7xl">
    <div class="mb-8 flex items-center justify-between">
      <h2 class="text-sm font-bold tracking-wider text-black">WEAR THE LEGACY</h2>
      <div class="flex items-center gap-2">
        <button class="rounded border border-gray-200 p-2 transition-colors hover:bg-gray-50" aria-label="Previous category">◀</button>
        <button class="rounded border border-gray-200 p-2 transition-colors hover:bg-gray-50" aria-label="Next category">▶</button>
      </div>
    </div>

    <div class="grid gap-4 md:grid-cols-3">
      <a *ngFor="let category of categories" [href]="category.href" class="group relative aspect-[4/5] overflow-hidden rounded-sm">
        <img [src]="category.image" [alt]="category.title" class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-105" />
        <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"></div>
        <div class="absolute bottom-4 left-4">
          <h3 class="text-sm font-bold tracking-wider text-white">{{ category.title }}</h3>
        </div>
      </a>
    </div>
  </div>
</section>
