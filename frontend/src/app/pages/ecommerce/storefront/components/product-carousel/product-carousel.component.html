<section class="bg-white px-4 py-12">
  <div class="mx-auto max-w-7xl">
    <div class="mb-8 flex items-center justify-between gap-4">
      <h2 class="text-sm font-bold tracking-wider text-black">{{ title }}</h2>
      <div class="flex items-center gap-4">
        <a *ngIf="showAll" href="#" class="text-xs font-medium text-gray-600 transition-colors hover:text-black">SHOW ALL</a>
        <div class="flex items-center gap-2">
          <button class="rounded border border-gray-200 p-2 transition-colors hover:bg-gray-50" aria-label="Previous products">◀</button>
          <button class="rounded border border-gray-200 p-2 transition-colors hover:bg-gray-50" aria-label="Next products">▶</button>
        </div>
      </div>
    </div>

    <div class="grid gap-4 md:grid-cols-2 lg:grid-cols-4">
      <a *ngFor="let product of products; trackBy: trackById" [href]="product.href" class="group">
        <div class="relative mb-3 aspect-square overflow-hidden rounded-sm bg-gray-100">
          <img [src]="product.image" [alt]="product.name" class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-105" />
          <span
            *ngIf="product.badge"
            class="absolute left-2 top-2 rounded px-2 py-1 text-[10px] font-bold text-white"
            [ngClass]="product.badge === 'SALE' ? 'bg-red-500' : 'bg-black'"
          >
            {{ product.badge }}
          </span>
        </div>
        <h3 class="mb-1 line-clamp-2 text-xs font-medium text-gray-800">{{ product.name }}</h3>
        <p class="text-xs font-semibold text-black">{{ product.price }}</p>
      </a>
    </div>
  </div>
</section>
