<footer class="bg-white border-t border-gray-100">
  <div class="mx-auto max-w-7xl px-4 py-12">
    <div class="mb-12 grid grid-cols-2 gap-8 md:grid-cols-4 lg:grid-cols-6">
      <div class="col-span-2 md:col-span-4 lg:col-span-1">
        <a href="/" class="mb-4 flex items-center gap-2">
          <span class="text-xl font-bold tracking-tight">ONYX</span>
          <span class="border-l border-gray-300 pl-2 text-[10px] font-medium text-gray-500">TEE</span>
        </a>
        <p class="mb-4 text-[10px] leading-relaxed text-gray-500">ONYX TEE a Harvest Clover LLC brand!</p>
        <div class="flex items-center gap-3">
          <a href="#" class="text-gray-400 transition-colors hover:text-black">IG</a>
          <a href="#" class="text-gray-400 transition-colors hover:text-black">FB</a>
          <a href="#" class="text-gray-400 transition-colors hover:text-black">TW</a>
        </div>
      </div>

      <div *ngFor="let group of footerGroups">
        <h3 class="mb-3 text-[10px] font-bold text-black">{{ group.title }}</h3>
        <ul class="space-y-2 text-[10px] text-gray-500">
          <li *ngFor="let link of group.links">
            <a href="#" class="transition-colors hover:text-black">{{ link }}</a>
          </li>
        </ul>
      </div>
    </div>

    <div class="flex flex-col items-center justify-between border-t border-gray-100 pt-8 text-center md:flex-row">
      <div class="mb-4 flex items-center gap-4 md:mb-0">
        <select class="rounded border border-gray-200 bg-transparent px-2 py-1 text-[10px] text-gray-500">
          <option>United States (USD $)</option>
        </select>
        <select class="rounded border border-gray-200 bg-transparent px-2 py-1 text-[10px] text-gray-500">
          <option>English</option>
        </select>
      </div>
      <p class="text-[10px] text-gray-400">© 2025 ONYX TEE</p>
      <div class="mt-4 flex items-center gap-2 md:mt-0">
        <div class="flex h-5 w-8 items-center justify-center rounded bg-gray-200 text-[8px]">VISA</div>
        <div class="flex h-5 w-8 items-center justify-center rounded bg-gray-200 text-[8px]">MC</div>
        <div class="flex h-5 w-8 items-center justify-center rounded bg-gray-200 text-[8px]">AMEX</div>
        <div class="flex h-5 w-8 items-center justify-center rounded bg-gray-200 text-[8px]">PP</div>
      </div>
    </div>
  </div>
</footer>
