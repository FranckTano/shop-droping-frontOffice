# ==============================
# SERVEUR (Render injecte PORT)
# ==============================
server.port=${PORT:8080}

# ==============================
# DATABASE (Render PostgreSQL)
# ==============================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================
# JPA
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ==============================
# FLYWAY
# ==============================
spring.flyway.enabled=false

# ==============================
# JWT
# ==============================
application.security.jwt.secret-key=${JWT_SECRET}
application.security.jwt.expiration=3600000
application.security.jwt.refresh-token.expiration=604800000

# ==============================
# UPLOADS (filesystem ephémère /tmp sur Render)
# ==============================
file-upload-base-path=/tmp/shop-dropping/uploads
file.invoice.path=/tmp/shop-dropping/invoices
file.product.image-path=/tmp/shop-dropping/products/images

# ==============================
# FRONTEND URLS (CORS)
# ==============================
frontend.url.prod=${FRONTEND_URL:https://shop-droping-boutique.vercel.app}
client-base-url-prod=${FRONTEND_URL:https://shop-droping-boutique.vercel.app}

# ==============================
# ACTUATOR
# ==============================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ==============================
# LOGS (réduire le bruit en prod)
# ==============================
logging.level.root=WARN
logging.level.com.shop=INFO
