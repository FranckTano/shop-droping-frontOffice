# ===============================
# APPLICATION
# ===============================
app.name=SHOP-DROPPING
app.version=1.0.0
api-version=v1

# ===============================
# SERVEUR
# ===============================
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ===============================
# DATABASE (POSTGRESQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/shop_dropping
spring.datasource.username=maillot
spring.datasource.password=maillot
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# FLYWAY (DESACTIVE POUR LE MOMENT)
# ===============================
spring.flyway.enabled=false

# ===============================
# THYMELEAF
# ===============================
spring.thymeleaf.check-template-location=false

# ===============================
# SECURITE JWT
# ===============================
application.security.jwt.secret-key=CHANGE_ME_SHOP_DROPPING_SECRET_KEY_2026_MIN_32_BYTES
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# ===============================
# API
# ===============================
api.prefix=/api

# ===============================
# FRONTEND URLS
# ===============================
client-base-url-local=http://localhost:4400
client-base-url-online=http://localhost:8080
client-base-url-prod=https://shop-dropping.com

frontend.url.local=http://localhost:4400
frontend.url.dev=http://localhost:8080
frontend.url.prod=https://shop-dropping.com

# ===============================
# FILE UPLOAD
# ===============================
file-upload-base-path=${user.home}/shop-dropping/uploads
file.invoice.path=${user.home}/shop-dropping/invoices
file.product.image-path=${user.home}/shop-dropping/products/images

assets.img.path=/assets/images/

# ===============================
# ACTUATOR / MONITORING
# ===============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ===============================
# TWILIO (A CONFIGURER PLUS TARD)
# ===============================
twilio.account.sid=ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
twilio.auth.token=your_auth_token
twilio.whatsapp.from=+14155238886